events {}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server {
        # Słuchamy na porcie 8080 - standard Cloud Run
        listen 8080;
        
        # Katalog główny aplikacji
        root /usr/share/nginx/html;
        index index.html;

        # Obsługa routingu SPA (React Router)
        # Jeśli nie znajdzie pliku, odsyła do index.html
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Cache dla plików statycznych (dla lepszej wydajności)
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|zip)$ {
            expires 1y;
            add_header Cache-Control "public, no-transform";
        }
    }
}
